<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalMaster - Track Your Dreams</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>GoalMaster</h1>
            <p class="tagline">Your Big Brother to Success</p>
        </header>
        <div id="flip-timer" class="flip-timer"></div>
        <div id="goal-list" class="goal-list"></div>
        <form id="goal-form" class="goal-form">
            <input type="text" id="goal-name" placeholder="Enter Your Goal" required>
            <input type="date" id="goal-deadline" required>
            <button type="submit" class="add-btn">Add Goal</button>
        </form>
        <div id="motivation" class="motivation"></div>
        <div id="completed-goals" class="completed-goals">
            <h2>Completed Goals</h2>
            <ul id="completed-list"></ul>
        </div>
    </div>

    <!-- Firebase SDK -->
